<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شركة فضاء التقنية - دليل الأسعار</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 650px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .logo-container {
            margin-bottom: 15px;
        }
        .logo-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 3px solid #007bff;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin: 10px 0 5px 0;
        }
        .subtitle {
            color: #666;
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 15px;
        }
        .meta-info {
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #555;
            display: flex;
            flex-direction: column;
            gap: 5px;
            border-right: 4px solid #007bff;
        }
        .update-time {
            color: #27ae60;
            font-weight: bold;
        }
        .search-box {
            width: 100%;
            padding: 12px 20px;
            margin: 10px 0;
            box-sizing: border-box;
            border: 2px solid #ccc;
            border-radius: 25px;
            font-size: 16px;
            text-align: right;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-box:focus {
            border-color: #007bff;
        }
        .status {
            color: #e67e22;
            font-weight: bold;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }
        th {
            background-color: #007bff;
            color: white;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .no-result {
            color: #95a5a6;
            margin-top: 20px;
        }
        .badge {
            background-color: #2ecc71;
            color: white;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 14px;
        }
        .badge-min {
            background-color: #e74c3c;
            color: white;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- قسم الشعار -->
        <div class="logo-container">
            <img src="logo.jpg" alt="شعار شركة فضاء التقنية" class="logo-img">
        </div>

        <h1>شركة فضاء التقنية</h1>
        <div class="subtitle">دليل الأسعار الإلكتروني</div>
        
        <!-- قسم الوقت والتاريخ وآخر تحديث -->
        <div class="meta-info">
            <div id="liveClock">📅 التاريخ: --/--/---- | ⏰ الوقت: --:--:--</div>
            <div id="lastUpdateTime" class="update-time">🔄 جاري التحقق من آخر تحديث للأسعار...</div>
        </div>

        <input type="text" id="searchInput" class="search-box" placeholder="🔍 ابحث باسم الصنف...">
        
        <div id="statusMessage" class="status">🚧 جاري تحميل البيانات من النظام...</div>
        <div id="resultsContainer"></div>
    </div>

    <script>
        // رابط الشيت الأساسي
        const BASE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSSn5uA56Qo_nydx3V_pK7IgZKR22Hx_zjilNdpBNbnqelTWsqnjmMt4lE19HtnZbsVsLnUqsLZ94zU/pub';
        
        // جلب الصفحتين (الأساسية الممثلة برقم 0، والصفحة الثانية المعطاة)
        const URL_PAGE_1 = `${BASE_URL}?gid=0&output=csv`;
        const URL_PAGE_2 = `${BASE_URL}?gid=980123048&output=csv`;
        
        let products = [];

        // 1. دالة الساعة الحية والتاريخ
        function updateClock() {
            const now = new Date();
            const options = { year: 'numeric', month: '2-digit', day: '2-digit' };
            const dateStr = now.toLocaleDateString('ar-LY', options);
            const timeStr = now.toLocaleTimeString('ar-LY', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            document.getElementById('liveClock').innerHTML = `📅 التاريخ: ${dateStr} | ⏰ الوقت: ${timeStr}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. دالة جلب البيانات من الصفحتين ودمجهما
        async function loadPrices() {
            try {
                // محاولة جلب الورقة الأولى (gid=0)
                let products1 = [];
                try {
                    const response1 = await fetch(URL_PAGE_1);
                    const data1 = await response1.text();
                    products1 = parseCSV(data1);
                } catch(e) { console.error("خطأ في جلب ورقة 0", e); }

                // محاولة جلب الورقة الثانية (gid=980123048)
                let products2 = [];
                try {
                    const response2 = await fetch(URL_PAGE_2);
                    const data2 = await response2.text();
                    products2 = parseCSV(data2);
                } catch(e) { console.error("خطأ في جلب ورقة 980123048", e); }

                // دمج البيانات بالكامل وتصفية الفراغات
                const combined = [...products1, ...products2];
                
                // إلغاء تكرار الأسماء المتطابقة تماماً إن وجدت
                const uniqueProducts = [];
                const seenNames = new Set();
                
                for (const item of combined) {
                    if (item.name && !seenNames.has(item.name)) {
                        seenNames.add(item.name);
                        uniqueProducts.push(item);
                    }
                }
                
                products = uniqueProducts;
                document.getElementById('statusMessage').style.display = 'none';
                document.getElementById('lastUpdateTime').innerHTML = `⏱️ تم تحديث الأسعار فوراً عند فتح الصفحة`;

            } catch (error) {
                console.error("خطأ عام في جلب البيانات:", error);
                document.getElementById('statusMessage').innerText = "❌ حدث خطأ أثناء تحميل الأسعار.";
            }
        }

        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            if (lines.length === 0) return [];
            
            // تنظيف رؤوس الأعمدة من الرموز والمسافات (مثل # أو -) لضمان القراءة الصحيحة
            const headers = lines[0].replace(/"/g, '').split(',').map(h => {
                return h.replace('#', '').replace('-', '').replace(' ', '').trim().toLowerCase();
            });
            
            return lines.slice(1).map(line => {
                if (!line.trim()) return null;
                const columns = line.replace(/"/g, '').split(',');
                let obj = {};
                headers.forEach((header, index) => {
                    // معالجة أسماء الأعمدة وتنظيفها
                    let cleanedHeader = header.replace('#', '').replace('-', '').replace(' ', '').trim().toLowerCase();
                    obj[cleanedHeader] = columns[index] ? columns[index].trim() : '';
                });
                return obj;
            }).filter(item => item !== null);
        }

        // محرك البحث
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (query === '') {
                resultsContainer.innerHTML = '';
                return;
            }

            const filtered = products.filter(product => {
                return product.name && product.name.toLowerCase().includes(query);
            });

            displayResults(filtered);
        });

        function displayResults(results) {
            if (results.length === 0) {
                resultsContainer.innerHTML = '<p class="no-result">عذراً، الصنف غير موجود</p>';
                return;
            }

            let html = `<table>
                            <tr>
                                <th>الصنف</th>
                                <th>الكمية</th>
                                <th>السعر</th>
                                <th>أقل سعر</th>
                            </tr>`;
            
            results.forEach(product => {
                // جلب الحقول بناء على التسميات النظيفة بعد إزالة المسافات والرموز
                html += `<tr>
                            <td><strong>${product.name || '-'}</strong></td>
                            <td>${product.quantity || '-'}</td>
                            <td><span class="badge">${product.price || '-'}</span></td>
                            <td><span class="badge-min">${product.minprice || '-'}</span></td>
                         </tr>`;
            });
            
            html += '</table>';
            resultsContainer.innerHTML = html;
        }

        loadPrices();
    </script>
</body>
</html>
